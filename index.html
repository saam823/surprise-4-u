<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عندي سؤال</title>

<style>
body {
    margin: 0;
    font-family: Tahoma;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* الخلفية السوداء بالبداية */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    z-index: -1;
    transition: background 2s ease-in-out;
}

/* النجوم المتحركة */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #00f;
    border-radius: 50%;
    animation: moveStar linear infinite;
}
@keyframes moveStar {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
}

/* الصورة النهائية */
.final-bg {
    background: url("photo.jpg") no-repeat center center/cover !important;
    filter: brightness(50%);
    animation: fadeZoom 2s ease forwards;
}

/* fade + zoom */
@keyframes fadeZoom {
    0% { opacity: 0; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
}

.box {
    position: relative;
    z-index: 2;
    top: 50%;
    transform: translateY(-50%);
    max-width: 600px;
    margin: auto;
}

/* الكتابة حرف حرف */
.letter {
    display: inline-block;
    opacity: 0;
    animation: appear 0.05s forwards;
}
@keyframes appear {
    to { opacity: 1; }
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    background: white;
    color: black;
    font-size: 16px;
    cursor: pointer;
}
button:hover { background: #ccc; }
.hidden { display: none; }

</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="box">

<div id="q1">
<h2>عندي سؤال الج</h2>
<p>تحبيني هواي لو شوي؟</p>
<button onclick="next('q2')">احبك هواي</button>
<button onclick="next('q2')">شوي</button>
</div>

<div id="q2" class="hidden">
<h2>سؤال ثاني </h2>
<p>تريدين تشوفين جزء بسيط من حبي الج؟</p>
<button onclick="showFinal()">اي طبعاً</button>
<button onclick="showFinal()">غصبا عنج اي</button>
</div>

<div id="final" class="hidden">
<h2 id="msgTitle"></h2>
<p id="msgText"></p>
</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- صوت خفيف لكل حرف -->
<audio id="typeSound">
<source src="type.mp3" type="audio/mpeg">
</audio>

</div>

<script>
// نجوم عشوائية
for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random()*100 + "vw";
    star.style.top = Math.random()*100 + "vh";
    star.style.animationDuration = (Math.random()*5+5) + "s";
    document.getElementById("bg").appendChild(star);
}

var music = document.getElementById("music");
var typeSound = document.getElementById("typeSound");
var started = false;

function startMusic() {
    if (!started) {
        music.play();
        started = true;
    }
}

function next(nextId) {
    startMusic();
    document.querySelector(".box > div:not(.hidden)").classList.add("hidden");
    document.getElementById(nextId).classList.remove("hidden");
}

function showFinal() {
    startMusic();
    document.querySelector(".box > div:not(.hidden)").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");

    // تغيير الخلفية إلى الصورة مع fade + zoom
    var bg = document.getElementById("bg");
    bg.classList.add("final-bg");

    // كتابة الرسالة حرف حرف مع صوت خفيف
    let title = "To The Prettiest Girl Ive Ever Seen";
    let text = "منايتي متدرين شلون احبج وشلون اشوف الدنيا كلها بعيونج , ما ادري شلون 
  جنت محظوظ هلكد حتى احصل اجمل بنية بالدنيا كلها , 
  محد مثلج يفهمني ويفسر كلامي مثل ما اني افهمه , كلما جاي نعيش يوم سوية 
  اني وياج كلما جاي احبج اكثر .
  اتمنى لو انت يمي هسة واكدر ابوسج من كل مكان بوجهج حتى اشوفج شلون احبج 
  بالواقع مو بس حجي , انت تعنيلي كل شي بحياتي , اصلا حياتي بدت 
  من عرفتج , بدونج عبالك حياتي ابيض واسود وبس دخلتيها تلونت بالوان لطافتج وكلامج 
  الحلو الي , كل الي كتبته هو جزء بسيط من حبي الج وبس نلتقي راح تشوفين كل حبي";
    typeText("msgTitle", title, 0, () => typeText("msgText", text, 0, null));
}

function typeText(id, text, index, callback) {
    if (index < text.length) {
        let span = document.createElement("span");
        span.classList.add("letter");
        span.textContent = text[index];
        document.getElementById(id).appendChild(span);
        typeSound.currentTime = 0;
        typeSound.play();
        setTimeout(() => typeText(id, text, index+1, callback), 50);
    } else if (callback) callback();
}
</script>

</body>
</html>
